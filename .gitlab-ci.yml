default:
  image: node:22

stages:
  - install
  - build

variables:
  PNPM_HOME: /root/.local/share/pnpm
  PNPM_STORE: /root/.local/share/pnpm/store
  GIT_SUBMODULE_STRATEGY: recursive

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .pnpm-store
    - apps/readest-app/.next/cache

before_script:
  - corepack enable
  - corepack prepare pnpm@10.33.0 --activate
  - pnpm config set store-dir $PNPM_STORE

install:
  stage: install
  script:
    - pnpm install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
      - apps/readest-app/node_modules/
      - packages/*/node_modules/

build-web:
  stage: build
  needs: [install]
  script:
    - cd apps/readest-app
    - echo "NEXT_PUBLIC_APP_PLATFORM=web" > .env.web
    - touch .env.local
    - pnpm build-web
  artifacts:
    paths:
      - apps/readest-app/.next
    expire_in: 1 day
  only:
    - main
    - master
