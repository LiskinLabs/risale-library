default:
  image: node:22

stages:
  - verify

variables:
  PNPM_HOME: /root/.local/share/pnpm

before_script:
  - corepack enable
  - corepack prepare pnpm@latest --activate

verify:
  stage: verify
  script:
    - git submodule sync --recursive || true
    - for sm in packages/foliate-js packages/simplecc-wasm packages/qcms packages/tauri packages/tauri-plugins packages/js-mdict; do git submodule update --init --depth 1 $sm 2>/dev/null || true; done
    - pnpm install --no-frozen-lockfile || pnpm install --no-frozen-lockfile --ignore-scripts
    - cd apps/readest-app
    - echo "NEXT_PUBLIC_APP_PLATFORM=web" > .env.web
    - touch .env.local
    - npx next build
  only:
    - main
    - master
